apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "industrial-audio-rag.fullname" . }}
  labels:
    {{- include "industrial-audio-rag.labels" . | nindent 4 }}
spec:
  {{- if not .Values.app.autoscaling.enabled }}
  replicas: {{ .Values.app.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "industrial-audio-rag.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "industrial-audio-rag.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "industrial-audio-rag.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.app.securityContext | nindent 8 }}
      
      {{- if .Values.initContainers.dataLoader.enabled }}
      initContainers:
        - name: data-loader
          image: "{{ .Values.initContainers.dataLoader.image.registry }}/{{ .Values.initContainers.dataLoader.image.repository }}:{{ .Values.initContainers.dataLoader.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.dataLoader.image.pullPolicy }}
          command:
            {{- toYaml .Values.initContainers.dataLoader.command | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainers.dataLoader.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "industrial-audio-rag.fullname" . }}-config
            - secretRef:
                name: {{ include "industrial-audio-rag.fullname" . }}-secret
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: data-volume
              mountPath: /app/data
      {{- end }}
      
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.app.image.registry }}/{{ .Values.app.image.repository }}:{{ .Values.app.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          
          envFrom:
            - configMapRef:
                name: {{ include "industrial-audio-rag.fullname" . }}-config
            - secretRef:
                name: {{ include "industrial-audio-rag.fullname" . }}-secret
          
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: cache-volume
              mountPath: /app/cache
            {{- if .Values.app.persistence.enabled }}
            - name: data-volume
              mountPath: /app/data
            {{- end }}
      
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: cache-volume
          emptyDir: {}
        {{- if .Values.app.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "industrial-audio-rag.fullname" . }}-data
        {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}