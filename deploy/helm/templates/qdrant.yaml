{{- if .Values.qdrant.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "industrial-audio-rag.fullname" . }}-qdrant
  labels:
    {{- include "industrial-audio-rag.qdrant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "industrial-audio-rag.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "industrial-audio-rag.qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "industrial-audio-rag.qdrant.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.registry }}/{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ .Values.qdrant.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
  {{- else }}
        - name: qdrant-storage
          emptyDir: {}
  {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "industrial-audio-rag.fullname" . }}-qdrant
  labels:
    {{- include "industrial-audio-rag.qdrant.labels" . | nindent 4 }}
spec:
  type: {{ .Values.qdrant.service.type }}
  ports:
    - port: {{ .Values.qdrant.service.port }}
      targetPort: 6333
      protocol: TCP
      name: http
    - port: 6334
      targetPort: 6334
      protocol: TCP
      name: grpc
  selector:
    {{- include "industrial-audio-rag.qdrant.selectorLabels" . | nindent 4 }}
{{- end }}