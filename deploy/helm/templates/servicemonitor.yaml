{{- if and .Values.monitoring.prometheus.enabled .Values.monitoring.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "industrial-audio-rag.fullname" . }}
  labels:
    {{- include "industrial-audio-rag.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "industrial-audio-rag.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: {{ .Values.monitoring.prometheus.serviceMonitor.path }}
    interval: {{ .Values.monitoring.prometheus.serviceMonitor.interval }}
    scrapeTimeout: 10s
{{- end }}